# policiaDigital - Jekyll Configuration

title: 🚔 policiaDigital
description: "Car Patrol Survival - ¿Quién mejor que tú? Naiden."
baseurl: /policiadigital
url: https://mxjworld.github.io/policiadigital

# Theme Slate (Oscuro y profesional)
theme: jekyll-theme-slate
remote_theme: pages-themes/slate@v0.2.0

# Markdown
markdown: kramdown

# Plugins
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

# Metadata
author: mxjworld
email: tu@email.com
repository: mxjworld/policiadigital
github_username: mxjworld
lang: es

# Configuración adicional
show_downloads: true
downloads_url: https://mxjworld.github.io/policiadigital

# Excluir archivos
exclude:
  - README.md
  - LICENSE
  - Gemfile
  - Gemfile.lock
  - .gitignore

# Incluir
include:
  - index.html
